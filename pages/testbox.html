<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Box - Narayan Rueppel</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/styleSwitcher.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <!-- Preloader -->
    <div class="preloader">
        <div class="loader"></div>
    </div>
    <!-- Preloader End -->

    <div class="main-container">
        <!-- Aside -->
        <div class="aside">
            <div class="nav-toggler">
                <span></span>
            </div>
            <div class="aside-inner">
                <div class="logo">
                    <a href="../index.html">Narayan Rueppel</a>
                </div>
                <ul class="nav">
                    <li><a href="../index.html#home"><i class="fa fa-home"></i> Home</a></li>
                    <li><a href="../index.html#about"><i class="fa fa-user"></i> About</a></li>
                    <li><a href="../index.html#services"><i class="fa fa-list"></i> Services</a></li>
                    <li><a href="../index.html#projects"><i class="fa fa-briefcase"></i> Projects</a></li>
                    <li><a href="../index.html#tutoring"><i class="fa fa-graduation-cap"></i> Tutoring</a></li>
                    <li><a href="../index.html#contact"><i class="fa fa-comments"></i> Contact</a></li>
                </ul>
                <div class="copyright-text">
                    &copy; 2020 The WebShala Template
                </div>
            </div>
        </div>
        <!-- Aside End -->

        <!-- Main Content -->
        <div class="main-content">
            <!-- Project Details Section -->
            <section class="project-detail section active" id="project-detail">
                <div class="container">
                    <div class="row">
                        <div class="section-title padd-15">
                            <h2>Test Box</h2>
                        </div>
                    </div>
                    <div class="row">
                        <div class="project-detail-content padd-15">
                            <div class="row">
                                <div class="project-image padd-15">
                                    <img src="../images/portfolio/2.jpg" alt="Test Box Project" class="img-fluid">
                                </div>
                            </div>
                            <div class="row">
                                <div class="project-text padd-15">
                                    <h3>About Test Box</h3>
                                    <p> 5' x 5' x 2.5' steel box with polycarbonate walls—a paradox of strength and cost-efficiency.</p>
                                    
                                    <div style="margin-top: 30px;">
                                        <a href="../index.html#projects" class="btn" style="display: inline-block; padding: 10px 20px; background-color: #fdb750; color: #fff; text-decoration: none; border-radius: 5px;">Back to Projects</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <!-- Project Details Section End -->
        </div>
        <!-- Main Content End -->
    </div>

    
    <!-- Style Switcher -->
    <div class="style-switcher">
        <div class="style-switcher-toggler s-icon">
            <i class="fa fa-cog"></i>
        </div>
        <div class="day-night s-icon">
            <i class="fa fa-moon-o"></i>
        </div>
        <h4>Theme Colors</h4>
        <div class="colors">
            <span class="color-1" onclick="setActiveStyle('pink')"></span>
            <span class="color-2" onclick="setActiveStyle('blue')"></span>
            <span class="color-3" onclick="setActiveStyle('green')"></span>
            <span class="color-4" onclick="setActiveStyle('orange')"></span>
            <span class="color-5" onclick="setActiveStyle('yellow')"></span>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/styleSwitcher.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
